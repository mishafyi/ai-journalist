name: Publish

# Publishes to npm when a v* tag is pushed. Auth, in order of preference:
#   1. npm TRUSTED PUBLISHING (OIDC, tokenless) — once the package's npmjs.com
#      Settings → Trusted Publisher is configured for this repo + this workflow
#      file (publish.yml), the npm CLI detects the OIDC environment and uses it
#      automatically. Requires npm >= 11.5.1 (bumped below) + id-token: write.
#   2. Fallback: the NPM_TOKEN repo secret (granular bypass-2FA / automation
#      token) — used only when no trusted publisher is configured.
# The package ships raw .ts with no build step, so publish just packs the
# files listed in package.json "files".
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for npm trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # setup-node's Node 22 bundles npm 10.x; trusted publishing needs >= 11.5.1.
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@11 && npm --version

      - name: Install dependencies
        run: npm ci

      # The package is unscoped, so it publishes public by default — no
      # --access flag needed.
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
